<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejemplo de listas</title>
</head>
<body>

    <h1>Ejemplo de listas en HTML</h1>

    <h2>Lista desordenada (ul)</h2>
    <ul>
        <li>Manzana</li>
        <li>Banana</li>
        <li>Naranja</li>
    </ul>

    <h2>Lista ordenada (ol)</h2>
    <ol>
        <li>Primer paso</li>
        <li>Segundo paso</li>
        <li>Tercer paso</li>
    </ol>

</body>
</html>
